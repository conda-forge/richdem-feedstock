{% set version = "2.4.1" %}

package:
  name: richdem
  version: {{ version }}

source:
  url: https://github.com/giswqs/richdem2/archive/v{{ version }}.tar.gz
  sha256: 143bcffd3f2652af21d141321ac0f449d26210172855b115504d5a0264dbf898
  patches:
    - 0001-guard-openmp-vector-reduction-for-msvc.patch

build:
  number: 1
  skip: true  # [ppc64le]
  entry_points:
    - rd_depression_filling=richdem.cli:DepressionFilling
    - rd_breach_depressions=richdem.cli:BreachDepressions
    - rd_flow_accumulation=richdem.cli:FlowAccumulation
    - rd_terrain_attribute=richdem.cli:TerrainAttribute
    - rd_info=richdem.cli:RdInfo
    - rd_compare=richdem.cli:RdCompare

requirements:
  run_constrained:  # [osx]
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - python {{ python }}
    - pybind11
    - libgdal
    - pip

  host:
    - python {{ python }}
    - pip
    - numpy
    - libgdal-core
    - pybind11
    - setuptools
    - llvm-openmp  # [not win]
    - vcomp14  # [win]

  run:
    - python {{ python }}
    - setuptools
    - libgdal-core
    - numpy
    - vcomp14  # [win]

test:
  imports:
    - _richdem
    - richdem
  commands:
    - rd_depression_filling --help
    - rd_breach_depressions --help
    - rd_flow_accumulation --help
    - rd_terrain_attribute --help
    - rd_info --help
    - rd_compare --help

about:
  home: https://github.com/r-barnes/richdem
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE.txt
  summary: High-Performance Terrain Analysis

extra:
  recipe-maintainers:
    - r-barnes
    - mcflugen
    - ocefpaf
    - hobu
    - giswqs
